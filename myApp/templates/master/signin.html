{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>

<!-- Custom CSS -->
<link rel="stylesheet" href="{% static 'css/messages.css' %}">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
}

.container{
    background:#fff;
    padding:40px;
    width:350px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#4338ca;
}

p{
    text-align:center;
    margin-top:15px;
}

a{
    color:#4f46e5;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="container">
    <h2>Sign In</h2>

    <form method="post">
        {% csrf_token %}
        {% include 'master/messages.html' %}
        <input type="text" name="username" placeholder="username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
    </form>

    <p>
        Don't have an account?
        <a href="{% url 'signup' %}">Sign Up</a>
    </p>
</div>
